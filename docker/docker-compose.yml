version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://studafly:studafly@db:5432/studafly
      REDIS_URL: redis://redis:6379
    command: >
      sh -c "alembic upgrade head && python -m seeds.seed && uvicorn src.app.main:app --host 0.0.0.0 --port 8080 --reload"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: studafly
      POSTGRES_PASSWORD: studafly
      POSTGRES_DB: studafly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studafly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
